app_name: ScholarMind
environment: development
log_level: INFO
database_url: sqlite:///data/sqlite/scholar_mind.db
checkpoint_database_url: sqlite:///data/sqlite/checkpoints.db
redis_url: redis://localhost:6379/0
qdrant_url:
qdrant_location: data/qdrant
celery_task_always_eager: false
llm_provider: openai_compatible
llm_reasoning_model: openai/gpt-5.4
llm_light_model: openai/gpt-5.4-mini
llm_base_url:
llm_api_key:
llm_request_timeout_seconds: 20.0
llm_max_retries: 1
embedding_model: embedding-3
embedding_base_url: https://open.bigmodel.cn/api/paas/v4
#embedding_model: baai/bge-m3
#embedding_base_url: https://openrouter.ai/api/v1
embedding_api_key:
default_user_id: local-user
message_context_window_tokens: 32768
message_compact_threshold_ratio: 0.75
memory_top_k: 5
memory_min_similarity_score: 0.6
log_dir: data/message_logs
memory_root_dir: data/memory
eval_root_dir: data/eval
prompt_dir: config/prompts
